version: "3"

services:
  db:
    image: postgres:16-alpine
    container_name: iuce-web-postgres
    environment:
      POSTGRES_USER: iuce
      POSTGRES_PASSWORD: iuce2024
      POSTGRES_DB: iuce_web
    ports:
      # 5433 en el host: el 5432 lo ocupa el postgres de IUCE-Reservas-TFG
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
